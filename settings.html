<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Instellingen</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
padding:20px;
background:#f5f5f5;
}

h1{
margin-bottom:20px;
}

.container{
max-width:900px;
margin:auto;
}

.box{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input, select{
padding:8px;
margin-top:10px;
width:100%;
box-sizing:border-box;
}

button{
margin-top:10px;
padding:10px;
border:none;
background:#4CAF50;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#45a049;
}

#searchSettings{
width:100%;
padding:10px;
margin-bottom:20px;
}

</style>

</head>

<body>

<div class="container">

<h1>Instellingen</h1>

<input type="text" id="searchSettings" placeholder="Zoek instelling...">

<!-- Domein toevoegen -->
<div class="box settingBlock" data-name="domein toevoegen">
<h2>Domein toevoegen</h2>

<input type="text" id="domeinNaam" placeholder="Naam domein">
<button onclick="addDomein()">Toevoegen</button>

<ul id="domeinLijst"></ul>

</div>


<!-- Thema toevoegen -->
<div class="box settingBlock" data-name="thema toevoegen aan domein">

<h2>Thema toevoegen aan domein</h2>

<select id="domeinSelect"></select>

<input type="text" id="themaNaam" placeholder="Naam thema">

<button onclick="addThema()">Toevoegen</button>

<ul id="themaLijst"></ul>

</div>


<!-- Doel toevoegen -->
<div class="box settingBlock" data-name="doel toevoegen aan thema">

<h2>Doel toevoegen aan thema</h2>

<select id="themaSelect"></select>

<input type="text" id="doelNaam" placeholder="Naam doel">

<button onclick="addDoel()">Toevoegen</button>

<ul id="doelLijst"></ul>

</div>

</div>


<!-- Firebase -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


const firebaseConfig = {

apiKey: "JOUW_API_KEY",
authDomain: "JOUW_PROJECT.firebaseapp.com",
projectId: "JOUW_PROJECT",
storageBucket: "JOUW_PROJECT.appspot.com",
messagingSenderId: "XXXX",
appId: "XXXX"

};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();


/* LOGIN CONTROLE */

onAuthStateChanged(auth, async (user)=>{

if(!user){

window.location.href="login.html";
return;

}

const ref = doc(db,"users",user.uid);
const snap = await getDoc(ref);

if(!snap.exists()){
window.location.href="index.html";
return;
}

const role = snap.data().role;

if(role !== "directie"){

alert("Je hebt geen toegang tot instellingen");
window.location.href="index.html";

}

loadDomeinen();

});


/* DOMEIN TOEVOEGEN */

async function addDomein(){

const naam = document.getElementById("domeinNaam").value;

if(naam=="") return;

await addDoc(collection(db,"domeinen"),{
naam:naam
});

document.getElementById("domeinNaam").value="";

loadDomeinen();

}


/* THEMA TOEVOEGEN */

async function addThema(){

const naam = document.getElementById("themaNaam").value;
const domein = document.getElementById("domeinSelect").value;

if(naam=="") return;

await addDoc(collection(db,"themas"),{

naam:naam,
domein:domein

});

document.getElementById("themaNaam").value="";

}


/* DOEL TOEVOEGEN */

async function addDoel(){

const naam = document.getElementById("doelNaam").value;
const thema = document.getElementById("themaSelect").value;

if(naam=="") return;

await addDoc(collection(db,"doelen"),{

naam:naam,
thema:thema

});

document.getElementById("doelNaam").value="";

}


/* DOMEIN LADEN */

async function loadDomeinen(){

const querySnapshot = await getDocs(collection(db,"domeinen"));

const lijst = document.getElementById("domeinLijst");
const select = document.getElementById("domeinSelect");

lijst.innerHTML="";
select.innerHTML="";

querySnapshot.forEach((doc)=>{

const data = doc.data();

const li = document.createElement("li");
li.textContent=data.naam;
lijst.appendChild(li);

const option = document.createElement("option");
option.value=data.naam;
option.textContent=data.naam;
select.appendChild(option);

});

}


/* ZOEK FILTER */

document.getElementById("searchSettings").addEventListener("input", function(){

const value = this.value.toLowerCase();

document.querySelectorAll(".settingBlock").forEach(block=>{

const name = block.dataset.name;

if(name.includes(value)){

block.style.display="block";

}else{

block.style.display="none";

}

});

});

</script>

</body>
</html>
